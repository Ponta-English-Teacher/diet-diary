<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Diet Diary</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Nunito:wght@300;400;600;700;800&display=swap');

  :root {
    --bg: #f5f0eb;
    --card: #fffdf9;
    --primary: #e8805a;
    --primary-light: #f5b89a;
    --primary-dark: #c65f38;
    --accent: #5ab8a8;
    --accent-light: #a8ddd6;
    --purple: #9b7ec8;
    --yellow: #f5c842;
    --pink: #e87a9b;
    --text: #2d2318;
    --text-sub: #7a6a5a;
    --text-muted: #b0a090;
    --border: #e8ddd0;
    --shadow: 0 4px 20px rgba(45,35,24,0.08);
    --shadow-lg: 0 8px 40px rgba(45,35,24,0.15);
    --radius: 18px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  .app-header {
    background: var(--card);
    padding: 16px 20px 12px;
    box-shadow: var(--shadow);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .app-title {
    font-family: 'Nunito', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -0.5px;
  }

  .app-title span { color: var(--accent); }

  /* ===== DATE NAV ===== */
  .date-nav {
    background: var(--card);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .date-nav-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text-sub);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .date-nav-btn:active { transform: scale(0.9); background: var(--primary); color: white; border-color: var(--primary); }

  .date-display {
    flex: 1;
    text-align: center;
  }

  .date-display input[type="date"] {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    border: none;
    background: transparent;
    text-align: center;
    width: 100%;
    cursor: pointer;
    outline: none;
  }

  .date-today-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 2px solid var(--primary);
    background: transparent;
    color: var(--primary);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .date-today-btn:active { background: var(--primary); color: white; }

  /* ===== VIEW TABS ===== */
  .view-tabs {
    display: flex;
    background: var(--card);
    padding: 8px 20px;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .view-tab {
    flex: 1;
    padding: 8px;
    border-radius: 10px;
    border: none;
    background: var(--bg);
    color: var(--text-sub);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .view-tab.active {
    background: var(--primary);
    color: white;
  }

  /* ===== MAIN CONTENT ===== */
  .main-content {
    padding: 16px 16px 100px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ===== STATUS STRIP ===== */
  .status-strip {
    background: var(--card);
    border-radius: var(--radius);
    padding: 10px 14px 12px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
  }

  .status-strip-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .status-chips-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .status-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    font-family: 'Noto Sans JP', sans-serif;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    transition: all 0.2s;
  }

  .status-chip.done {
    background: #edfaf4;
    border-color: #7ecba8;
    color: #2a9d6a;
  }

  .status-chip-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .status-chip.done .status-chip-dot {
    background: #2a9d6a;
  }

  /* ===== CATEGORY GRID ===== */
  .category-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .cat-btn {
    background: var(--card);
    border: none;
    border-radius: var(--radius);
    padding: 16px 8px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .cat-btn:active {
    transform: scale(0.95);
    box-shadow: 0 2px 8px rgba(45,35,24,0.1);
  }

  .cat-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 4px 4px 0 0;
    transition: height 0.2s;
  }

  /* done state: accent bar grows + card tint */
  .cat-btn.done {
    background: var(--card);
  }
  .cat-btn.done::before { height: 100%; opacity: 0.07; border-radius: var(--radius); }

  .cat-btn.weight::before  { background: var(--primary); }
  .cat-btn.meal::before    { background: var(--yellow); }
  .cat-btn.alcohol::before { background: var(--purple); }
  .cat-btn.exercise::before{ background: var(--accent); }
  .cat-btn.sleep::before   { background: #7eb8e8; }
  .cat-btn.toilet::before  { background: #b8d47e; }
  .cat-btn.water::before   { background: #7ed4e8; }
  .cat-btn.condition::before{ background: var(--pink); }
  .cat-btn.photo::before   { background: #e8c27e; }
  .cat-btn.graph::before   { background: var(--accent); }
  .cat-btn.export::before  { background: var(--primary); }
  .cat-btn.settings::before{ background: var(--text-muted); }

  .cat-btn img {
    width: 44px;
    height: 44px;
    object-fit: contain;
    border-radius: 10px;
  }

  .cat-btn-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
  }

  /* checkmark badge replaces the old dot */
  .cat-btn-dot {
    position: absolute;
    top: 6px; right: 6px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #2a9d6a;
    color: white;
    font-size: 10px;
    font-weight: 800;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }

  .cat-btn-dot.visible {
    display: flex;
  }

  /* ===== WEEK / MONTH VIEWS ===== */
  .view-section {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }

  .view-section h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--bg);
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--bg);
    font-size: 13px;
  }

  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--text-sub); }
  .stat-value { font-weight: 700; color: var(--text); }

  .chart-container {
    position: relative;
    height: 200px;
    margin-top: 12px;
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(45,35,24,0.5);
    z-index: 1000;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 480px;
    max-height: 88vh;
    overflow-y: auto;
    padding: 24px 20px 40px;
    animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .modal-title img {
    width: 32px; height: 32px;
    border-radius: 8px;
    object-fit: contain;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-sub);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--primary); }

  .tag-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text-sub);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tag-btn.selected {
    border-color: var(--primary);
    background: var(--primary);
    color: white;
  }

  .option-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .option-btn {
    flex: 1;
    min-width: 60px;
    padding: 10px 8px;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text-sub);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .option-btn.selected {
    border-color: var(--primary);
    background: var(--primary);
    color: white;
  }

  .section-divider {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin: 16px 0 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--accent-light);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .btn-save {
    flex: 2;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--primary);
    color: white;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-save:active { background: var(--primary-dark); transform: scale(0.98); }

  .btn-cancel {
    flex: 1;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    background: transparent;
    color: var(--text-sub);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ===== GRAPH MODAL ===== */
  .graph-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .graph-tab {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text-sub);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .graph-tab.active {
    border-color: var(--accent);
    background: var(--accent);
    color: white;
  }

  .graph-modal-chart {
    position: relative;
    height: 240px;
  }

  /* ===== EXPORT MODAL ===== */
  .export-textarea {
    width: 100%;
    height: 240px;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    resize: none;
    line-height: 1.6;
  }

  .btn-copy {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--accent);
    color: white;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.2s;
  }
  .btn-copy:active { background: #3fa090; }

  .export-type-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }

  .export-tab {
    flex: 1;
    padding: 8px 4px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text-sub);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .export-tab.active {
    border-color: var(--primary);
    background: var(--primary);
    color: white;
  }

  /* ===== SETTINGS ===== */
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--bg);
  }

  .settings-row:last-child { border-bottom: none; }

  .settings-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .settings-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .settings-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text-sub);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .settings-btn.danger {
    border-color: #e84040;
    color: #e84040;
  }

  .settings-btn.danger:active { background: #e84040; color: white; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: white;
    padding: 12px 24px;
    border-radius: 40px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Noto Sans JP', sans-serif;
    opacity: 0;
    transition: all 0.3s;
    z-index: 9999;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== PHOTO SECTION ===== */
  .photo-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .photo-thumb {
    width: 72px;
    height: 72px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid var(--border);
    position: relative;
  }

  .photo-thumb-wrap {
    position: relative;
    display: inline-block;
  }

  .photo-del-btn {
    position: absolute;
    top: -6px; right: -6px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #e84040;
    color: white;
    border: none;
    font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }

  .photo-add-btn {
    width: 72px; height: 72px;
    border-radius: 10px;
    border: 2px dashed var(--border);
    background: var(--bg);
    color: var(--text-muted);
    font-size: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* meal tabs */
  .meal-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }

  .meal-tab {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text-sub);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .meal-tab.active {
    border-color: var(--yellow);
    background: var(--yellow);
    color: var(--text);
  }

  .meal-panel { display: none; }
  .meal-panel.active { display: block; }

  /* view panels */
  .view-panel { display: none; }
  .view-panel.active { display: block; }

  /* empty state */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .empty-state-icon { font-size: 48px; margin-bottom: 10px; }

  /* ===== MEAL EVENT CARDS (inside modal) ===== */
  .meal-event-card {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 10px;
    position: relative;
  }
  .meal-event-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .meal-event-type-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }
  .meal-event-time-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 6px;
  }
  .meal-event-btns { display: flex; gap: 6px; }
  .meal-event-edit-btn, .meal-event-del-btn {
    padding: 4px 10px;
    border-radius: 20px;
    border: 2px solid var(--border);
    background: var(--card);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-sub);
  }
  .meal-event-edit-btn:active { background: var(--yellow); border-color: var(--yellow); color: var(--text); }
  .meal-event-del-btn:active  { background: #e84040; border-color: #e84040; color: white; }

  .meal-event-foods { display: flex; flex-direction: column; gap: 4px; }
  .meal-event-food-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 8px;
    background: var(--card);
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .meal-event-food-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .meal-event-portion {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
  }
  .mep-s { background: #d4f5e9; color: #2a9d6a; }
  .mep-m { background: #fef3d0; color: #b8820a; }
  .mep-l { background: #fde0e0; color: #c04040; }

  .meal-event-note { font-size: 11px; color: var(--text-muted); margin-top: 6px; font-style: italic; }

  /* food chips in meal form */
  .meal-food-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 3px 4px 3px 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    animation: chipPop 0.18s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes chipPop { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }
  .meal-chip-portion {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
  }
  .meal-chip-portion.cp-s { background: #d4f5e9; color: #2a9d6a; }
  .meal-chip-portion.cp-m { background: #fef3d0; color: #b8820a; }
  .meal-chip-portion.cp-l { background: #fde0e0; color: #c04040; }
  .meal-chip-remove {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: none;
    background: var(--border);
    color: var(--text-sub);
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    line-height: 1;
  }
  .meal-chip-remove:active { background: #e84040; color: white; }

  .meal-preset-tag {

</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="app-title">Diet <span>Diary</span></div>
</div>

<!-- DATE NAV -->
<div class="date-nav">

  <div class="date-display">
    <input type="date" id="dateInput" onchange="onDateChange(this.value)">
  </div>

  <button class="date-nav-btn" onclick="changeDate(1)">&gt;</button>
</div>

<!-- VIEW TABS -->
<div class="view-tabs">
  <button class="view-tab active" onclick="switchView('day', this)">日</button>
  <button class="view-tab" onclick="switchView('week', this)">週</button>
  <button class="view-tab" onclick="switchView('month', this)">月</button>
</div>

<!-- MAIN -->
<div class="main-content">

  <!-- DAY VIEW -->

          <div class="date-heading-weight-sub">朝体重</div>
        </div>
      </div>
    </div>

    <!-- Status Strip (2-row wrap) -->
    <div class="status-strip">
      <div class="status-strip-top">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">記録状況</div>
        <button class="copy-prev-btn" onclick="copyPrevDay()">前日コピー</button>
      </div>
      <div class="status-chips-wrap" id="statusGrid"></div>
    </div>

    <!-- Inline Meal Feed -->

    <!-- Category Grid -->
    <div class="category-grid">
      <button class="cat-btn weight" onclick="openModal('weight')">
        <img src="images/image_1.jpg" alt="体重" onerror="this.style.display='none'">
        <div class="cat-btn-label">体重</div>
        <div class="cat-btn-dot" id="dot-weight" style="display:none"></div>
      </button>
      <button class="cat-btn meal" onclick="openModal('meal')">
        <img src="images/image_2.jpg" alt="食事" onerror="this.style.display='none'">
        <div class="cat-btn-label">食事</div>
        <div class="cat-btn-dot" id="dot-meal" style="display:none"></div>
      </button>
      <button class="cat-btn alcohol" onclick="openModal('alcohol')">
        <img src="images/image_3.jpg" alt="飲酒" onerror="this.style.display='none'">
        <div class="cat-btn-label">飲酒</div>
        <div class="cat-btn-dot" id="dot-alcohol" style="display:none"></div>
      </button>
      <button class="cat-btn exercise" onclick="openModal('exercise')">
        <img src="images/image_4.jpg" alt="運動" onerror="this.style.display='none'">
        <div class="cat-btn-label">運動</div>
        <div class="cat-btn-dot" id="dot-exercise" style="display:none"></div>
      </button>
      <button class="cat-btn sleep" onclick="openModal('sleep')">
        <img src="images/image_5.jpg" alt="睡眠" onerror="this.style.display='none'">
        <div class="cat-btn-label">睡眠</div>
        <div class="cat-btn-dot" id="dot-sleep" style="display:none"></div>
      </button>
      <button class="cat-btn toilet" onclick="openModal('toilet')">
        <img src="images/image_6.jpg" alt="トイレ" onerror="this.style.display='none'">
        <div class="cat-btn-label">トイレ</div>
        <div class="cat-btn-dot" id="dot-toilet" style="display:none"></div>
      </button>
      <button class="cat-btn water" onclick="openModal('water')">
        <img src="images/image_7.jpg" alt="水分" onerror="this.style.display='none'">
        <div class="cat-btn-label">水分</div>
        <div class="cat-btn-dot" id="dot-water" style="display:none"></div>
      </button>
      <button class="cat-btn condition" onclick="openModal('condition')">
        <img src="images/image_8.jpg" alt="体調" onerror="this.style.display='none'">
        <div class="cat-btn-label">体調</div>
        <div class="cat-btn-dot" id="dot-condition" style="display:none"></div>
      </button>
      <button class="cat-btn photo" onclick="openModal('photo')">
        <img src="images/image_9.jpg" alt="写真" onerror="this.style.display='none'">
        <div class="cat-btn-label">写真</div>
        <div class="cat-btn-dot" id="dot-photo" style="display:none"></div>
      </button>
      <button class="cat-btn graph" onclick="openModal('graph')">
        <img src="images/image_10.jpg" alt="グラフ" onerror="this.style.display='none'">
        <div class="cat-btn-label">グラフ</div>
      </button>
      <button class="cat-btn export" onclick="openModal('export')">
        <img src="images/image_11.jpg" alt="出力" onerror="this.style.display='none'">
        <div class="cat-btn-label">出力</div>
      </button>
      <button class="cat-btn settings" onclick="openModal('settings')">
        <img src="images/image_12.jpg" alt="設定" onerror="this.style.display='none'">
        <div class="cat-btn-label">設定</div>
      </button>
    </div>

  </div><!-- end day view -->

  <!-- WEEK VIEW -->
  <div class="view-panel" id="viewWeek">
    <div class="view-section">
      <h3>📅 今週のサマリー</h3>
      <div id="weekStats"></div>
    </div>
    <div class="view-section">
      <h3>📈 今週の体重推移</h3>
      <div class="chart-container">
        <canvas id="weekChart"></canvas>
      </div>
    </div>
  </div>

  <!-- MONTH VIEW -->
  <div class="view-panel" id="viewMonth">
    <div class="view-section">
      <h3>📆 今月のサマリー</h3>
      <div id="monthStats"></div>
    </div>
    <div class="view-section">
      <h3>📈 今月の体重推移</h3>
      <div class="chart-container">
        <canvas id="monthChart"></canvas>
      </div>
    </div>
  </div>

</div><!-- end main -->

<div class="app-footer">Made by Hitoshi | English Teacher</div>

<!-- ======================== MODALS ======================== -->

<!-- WEIGHT MODAL -->
<div class="modal-overlay" id="modal-weight">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <img src="images/image_1.jpg" onerror="this.style.display='none'"> 体重
    </div>
    <div class="form-group">
      <label class="form-label">朝の体重 (kg)</label>
      <input type="number" class="form-input" id="weightMorn" step="0.1" placeholder="例: 82.4">
    </div>
    <div class="form-group">
      <label class="form-label">夜の体重 (kg)（任意）</label>
      <input type="number" class="form-input" id="weightEve" step="0.1" placeholder="例: 82.9">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('weight')">閉じる</button>
      <button class="btn-save" onclick="saveWeight()">保存</button>
    </div>
  </div>
</div>

<!-- MEAL MODAL (multi-event system) -->
<div class="modal-overlay" id="modal-meal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <img src="images/image_2.jpg" onerror="this.style.display='none'"> 食事
    </div>

    <!-- Meal list for the day -->
    <div id="mealEventList"></div>

    <!-- Add meal button -->
    <button class="tag-btn" id="addMealEventBtn" onclick="startNewMealEvent()"
      style="width:100%;border-radius:var(--radius-sm);padding:12px;font-size:14px;margin-bottom:4px">
      ＋ 食事を追加
    </button>

    <!-- Sub-form: add / edit a single meal event -->
    <div id="mealEventForm" style="display:none;margin-top:14px;border-top:2px solid var(--border);padding-top:14px">

      <!-- Meal type -->
      <div class="form-group">
        <label class="form-label">種類</label>
        <div class="option-group" id="mealTypeGroup">
          <button class="option-btn" onclick="selectMealEventType(this,'朝食')">朝食</button>
          <button class="option-btn" onclick="selectMealEventType(this,'昼食')">昼食</button>
          <button class="option-btn" onclick="selectMealEventType(this,'夕食')">夕食</button>
          <button class="option-btn" onclick="selectMealEventType(this,'間食')">間食</button>
          <button class="option-btn" onclick="selectMealEventType(this,'その他')">その他</button>
        </div>
        <input type="hidden" id="mealEventType">
      </div>

      <!-- Time -->
      <div class="form-group">
        <label class="form-label">時刻（任意）</label>
        <input type="time" class="form-input" id="mealEventTime">
      </div>

      <!-- Food presets -->
      <div class="form-group">
        <label class="form-label">食べたもの</label>
        <!-- selected chips -->
        <div id="mealEventChips" style="display:flex;flex-wrap:wrap;gap:6px;min-height:32px;padding:8px 10px;background:var(--bg);border:2px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px">
          <span id="mealEventChipHint" style="font-size:12px;color:var(--text-muted);font-style:italic">タップして選択 ↓</span>
        </div>
        <!-- preset buttons -->
        <div id="mealEventPresets" style="display:flex;flex-wrap:wrap;gap:7px;max-height:140px;overflow-y:auto;padding-bottom:4px"></div>
        <!-- custom input -->
        <div style="display:flex;gap:8px;margin-top:10px">
          <input type="text" class="form-input" id="mealEventCustomInput" placeholder="その他を入力…"
            style="flex:1;padding:9px 13px;font-size:14px"
            onkeydown="if(event.key==='Enter'){addMealEventCustomFood();event.preventDefault()}">
          <button class="btn-save" onclick="addMealEventCustomFood()" style="flex:0;padding:9px 16px;font-size:13px">追加</button>
        </div>
      </div>

      <!-- Note -->
      <div class="form-group">
        <label class="form-label">メモ（任意）</label>
        <input type="text" class="form-input" id="mealEventNote" placeholder="例: 外食、お腹いっぱい…">

      <!-- Sub-form actions -->
      <div style="display:flex;gap:8px">
        <button class="btn-cancel" onclick="cancelMealEventForm()" style="flex:1">キャンセル</button>
        <button class="btn-save" onclick="saveMealEvent()" id="mealEventSaveBtn" style="flex:2">この食事を保存</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-save" onclick="closeModal('meal')">閉じる</button>
    </div>
  </div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===================== STATE =====================
const FOOD_TAGS = ['オートミール','豆乳','卵','バナナ','ヨーグルト','パン','ご飯','麺','カレー','魚','肉','野菜','弁当','コンビニ食','その他'];

const MEAL_PRESETS = [
  'ご飯','パン','オートミール','パスタ','うどん','そば','ラーメン','寿司',
  '焼き肉','とんかつ','鶏むね肉','鶏もも肉','ささみ','魚','卵','豆腐',
  'サラダ','小鉢','野菜','スープ','クッキー','チョコレート','ヨーグルト',
  'ナッツ','フルーツ','アイスクリーム','その他'
];

const STORAGE_KEY = 'dietDiaryData';

let currentDate = todayStr();
let data = loadData();
let currentGraphDays = '7';
let currentExportTab = 'day';
let graphModalChart = null;
let weekChartInst = null;
let monthChartInst = null;
let tempPhotos = [];

// meal event state
let mealEventFoods = [];   // [{name, portion}]
let editingMealEventId = null;

// ===================== DATE UTILS =====================
function localDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function todayStr() {
  return localDateStr(new Date());
}

function formatDate(str) {
  const d = new Date(str + 'T00:00:00');
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

// ===================== DATA =====================
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getRecord(dateStr) {
  if (!data[dateStr]) {
    data[dateStr] = {
      date: dateStr,
      weight: { morning: '', evening: '' },
      mealEvents: [],
      // keep legacy meals key for copyPrevDay compatibility
      meals: {
        breakfast: { items: [], amount: '', note: '' },
        lunch: { items: [], amount: '', note: '' },
        dinner: { items: [], amount: '', note: '' }
      },
      alcohol: { hasAlcohol: null, types: [], cups: '', place: '', note: '' },
      sleep: { bedTime: '', wakeTime: '', hours: '' },
      toilet: { bowelCount: '', bowelCondition: '', urination: '' },
      water: { intake: '' },
      exercise: { types: [], duration: '', note: '' },
      condition: { tags: [], memo: '' },
      photos: [],
      updatedAt: ''
    };
  }
  if (!data[dateStr].mealEvents) data[dateStr].mealEvents = [];
  return data[dateStr];
}

// ===================== INIT =====================
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('dateInput').value = currentDate;
  renderDay();
});

// ===================== DATE NAV =====================
// programmaticChange flag prevents onDateChange from firing when we set input.value in code
let programmaticChange = false;

function changeDate(delta) {
  const d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  currentDate = localDateStr(d);
  programmaticChange = true;
  document.getElementById('dateInput').value = currentDate;
  programmaticChange = false;
  renderDay();
}

function onDateChange(val) {
  if (programmaticChange) return;
  if (val && val !== currentDate) {
    currentDate = val;
    renderDay();
  }
}

function goToday() {
  currentDate = todayStr();
  programmaticChange = true;
  document.getElementById('dateInput').value = currentDate;
  programmaticChange = false;
  renderDay();
}

// ===================== VIEW SWITCH =====================
function switchView(view, btn) {
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`view${view.charAt(0).toUpperCase()+view.slice(1)}`).classList.add('active');
  if (view === 'week') renderWeekView();
  if (view === 'month') renderMonthView();
}

// ===================== RENDER DAY =====================
function renderDay() {
  const rec = getRecord(currentDate);

  // --- date heading ---
  const d = new Date(currentDate + 'T00:00:00');
  const isToday = currentDate === todayStr();
  const weekDays = ['日','月','火','水','木','金','土'];
  const fullLabel = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${weekDays[d.getDay()]}）`;
  document.getElementById('dateHeadingLabel').textContent = isToday ? '今日' : '';
  document.getElementById('dateHeadingLabel').style.display = isToday ? 'block' : 'none';
  document.getElementById('dateHeadingFull').textContent = fullLabel;

  // weight in heading
  const wEl = document.getElementById('dateHeadingWeight');
  if (rec.weight.morning) {
    wEl.style.display = 'block';
    document.getElementById('dateHeadingWeightVal').textContent = rec.weight.morning;
  } else {
    wEl.style.display = 'none';
  }

  // --- status grid ---
  renderStatusGrid(rec);

  // --- inline meal feed ---
  renderInlineMealFeed(rec);

  // --- dots ---
  updateDots(rec);
}

function renderInlineMealFeed(rec) {
  const feed = document.getElementById('inlineMealFeed');
  const events = rec.mealEvents || [];
  const portionLabel = { s:'少', m:'普', l:'多' };
  const portionCls   = { s:'ifp-s', m:'ifp-m', l:'ifp-l' };

  if (!events.length) {
    feed.innerHTML = '<div class="inline-meals-empty">まだ食事の記録がありません</div>';
    return;
  }

  feed.innerHTML = events.map(ev => {
    const timeStr = ev.time ? `<span class="inline-meal-time">${ev.time}</span>` : '';
    let foodsHtml = '';
    if (ev.foods && ev.foods.length) {
      foodsHtml = '<div class="inline-meal-foods">' +
        ev.foods.filter(f => f.name).map(f => {
          const p = f.portion || '';
          const portionHtml = p ? `<span class="inline-food-portion ${portionCls[p]}">${portionLabel[p]}</span>` : '';
          return `<span class="inline-food-tag">${escHtml(f.name)}${portionHtml}</span>`;
        }).join('') + '</div>';
    }
    const noteHtml = ev.note ? `<div class="inline-meal-note">${escHtml(ev.note)}</div>` : '';
    return `<div class="inline-meal-card">
      <div class="inline-meal-top">
        <div><span class="inline-meal-type">${escHtml(ev.type||'食事')}</span>${timeStr}</div>
        <button class="inline-meal-edit-btn" onclick="openMealModalAndEdit('${ev.id}')">編集</button>
      </div>
      ${foodsHtml}${noteHtml}
    </div>`;
  }).join('');
}

function openMealModalAndEdit(id) {
  openModal('meal');
  // slight delay to let modal open first
  setTimeout(() => editMealEvent(id), 80);
}

function renderStatusGrid(rec) {
  const items = [
    { label: '体重',   done: !!(rec.weight.morning || rec.weight.evening) },
    { label: '食事',   done: hasMeal(rec) },
    { label: '飲酒',   done: rec.alcohol.hasAlcohol !== null },
    { label: '運動',   done: !!(rec.exercise.types && rec.exercise.types.length) },
    { label: '睡眠',   done: !!(rec.sleep.bedTime || rec.sleep.wakeTime) },
    { label: 'トイレ', done: !!(rec.toilet.bowelCount) },
    { label: '水分',   done: !!(rec.water.intake) },
    { label: '体調',   done: !!(rec.condition.tags.length || rec.condition.memo) },
    { label: '写真',   done: rec.photos.length > 0 },
  ];
  const grid = document.getElementById('statusGrid');
  grid.innerHTML = items.map(i =>
    `<div class="status-chip ${i.done ? 'done' : ''}">
      <div class="status-chip-dot"></div>${i.label}
    </div>`
  ).join('');
}

function hasMeal(rec) {
  return rec.mealEvents && rec.mealEvents.length > 0;
}

function updateDots(rec) {
  const map = {
    'weight': !!(rec.weight.morning || rec.weight.evening),
    'meal': hasMeal(rec),
    'alcohol': rec.alcohol.hasAlcohol !== null,
    'exercise': !!(rec.exercise.types && rec.exercise.types.length),
    'sleep': !!(rec.sleep.bedTime || rec.sleep.wakeTime),
    'toilet': !!(rec.toilet.bowelCount),
    'water': !!(rec.water.intake),
    'condition': !!(rec.condition.tags.length || rec.condition.memo),
    'photo': rec.photos.length > 0,
  };
  Object.entries(map).forEach(([k, v]) => {
    const dot = document.getElementById(`dot-${k}`);
    if (dot) dot.style.display = v ? 'block' : 'none';
  });
}

// ===================== MODALS =====================
function openModal(type) {
  const rec = getRecord(currentDate);

  if (type === 'weight') {
    document.getElementById('weightMorn').value = rec.weight.morning || '';
    document.getElementById('weightEve').value = rec.weight.evening || '';
  }
  if (type === 'meal') {
    renderMealEventList();
    hideMealEventForm();
  }
  if (type === 'alcohol') {
    const a = rec.alcohol;
    document.getElementById('alcNoneBtn').classList.toggle('selected', a.hasAlcohol === false);
    document.getElementById('alcYesBtn').classList.toggle('selected', a.hasAlcohol === true);
    document.getElementById('alcDetails').style.display = a.hasAlcohol ? 'block' : 'none';
    document.querySelectorAll('#modal-alcohol .tag-btn').forEach(btn => {
      btn.classList.toggle('selected', (a.types||[]).includes(btn.textContent));
    });
    restoreOption('modal-alcohol', 'alcCupsVal', a.cups);
    restoreOption('modal-alcohol', 'alcPlaceVal', a.place);
    document.getElementById('alcNote').value = a.note || '';
  }
  if (type === 'exercise') {
    document.querySelectorAll('#modal-exercise .tag-btn').forEach(btn => {
      btn.classList.toggle('selected', (rec.exercise.types||[]).includes(btn.textContent));
    });
    restoreOption('modal-exercise', 'exDurVal', rec.exercise.duration);
    document.getElementById('exNote').value = rec.exercise.note || '';
  }
  if (type === 'sleep') {
    document.getElementById('sleepBed').value = rec.sleep.bedTime || '';
    document.getElementById('sleepWake').value = rec.sleep.wakeTime || '';
    document.getElementById('sleepHours').value = rec.sleep.hours || '';
  }
  if (type === 'toilet') {
    restoreOption('modal-toilet', 'toiletBowelCount', rec.toilet.bowelCount);
    restoreOption('modal-toilet', 'toiletBowelCond', rec.toilet.bowelCondition);
    restoreOption('modal-toilet', 'toiletUrine', rec.toilet.urination);
  }
  if (type === 'water') {
    restoreOption('modal-water', 'waterIntake', rec.water.intake);
  }
  if (type === 'condition') {
    document.querySelectorAll('#modal-condition .tag-btn').forEach(btn => {
      btn.classList.toggle('selected', rec.condition.tags.includes(btn.textContent));
    });
    document.getElementById('condMemo').value = rec.condition.memo || '';
  }
  if (type === 'photo') {
    tempPhotos = [...(rec.photos||[])];
    renderPhotoPreview();
  }
  if (type === 'graph') {
    currentGraphDays = '7';
    document.querySelectorAll('.graph-tab').forEach((t,i) => t.classList.toggle('active', i===0));
    setTimeout(() => renderGraphModal(), 100);
  }
  if (type === 'export') {
    currentExportTab = 'day';
    document.querySelectorAll('.export-tab').forEach((t,i) => t.classList.toggle('active', i===0));
    renderExport();
  }

  document.getElementById(`modal-${type}`).classList.add('open');
}

function closeModal(type) {
  document.getElementById(`modal-${type}`).classList.remove('open');
}

// click overlay to close
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      overlay.classList.remove('open');
    }
  });
});

function restoreOption(groupId, hiddenId, value) {
  const hidden = document.getElementById(hiddenId);
  if (hidden) hidden.value = value || '';
  // find option btns in same modal
  const modal = document.getElementById(`modal-${groupId}`) || document.querySelector(`#modal-${groupId.split('-')[0]}`);
  // just scan all option-btns near hidden
  if (!value) return;
  const container = hidden.closest('.form-group');
  if (!container) return;
  container.querySelectorAll('.option-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.textContent.trim() === value.trim());
  });
}

// ===================== OPTION SELECT =====================
function selectOption(btn, hiddenId, value) {
  const group = btn.closest('.option-group') || btn.parentElement;
  group.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById(hiddenId).value = value;
}

function toggleTag(btn, group) {
  btn.classList.toggle('selected');
}

// ===================== SAVE FUNCTIONS =====================
function saveWeight() {
  const rec = getRecord(currentDate);
  rec.weight.morning = document.getElementById('weightMorn').value;
  rec.weight.evening = document.getElementById('weightEve').value;
  rec.updatedAt = new Date().toISOString();
  saveData();
  renderDay();
  closeModal('weight');
  showToast('体重を保存しました');
}

function saveMeal() {
  // (kept for legacy - actual saving done by saveMealEvent)
  renderDay();
  closeModal('meal');
}

// ===================== MEAL EVENTS =====================
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function renderMealEventList() {
  const rec = getRecord(currentDate);
  const events = rec.mealEvents || [];
  const container = document.getElementById('mealEventList');

  if (!events.length) {
    container.innerHTML = '<div style="text-align:center;padding:16px 0 10px;color:var(--text-muted);font-size:13px">まだ食事の記録がありません</div>';
    return;
  }

  const portionLabel = { s:'少', m:'普', l:'多' };
  const portionClass = { s:'mep-s', m:'mep-m', l:'mep-l' };

  container.innerHTML = events.map(ev => {
    const timeStr = ev.time ? `<span class="meal-event-time-label">${ev.time}</span>` : '';
    let foodsHtml = '';
    if (ev.foods && ev.foods.length) {
      foodsHtml = '<div class="meal-event-foods">' +
        ev.foods.filter(f => f.name).map(f => {
          const p = f.portion || '';
          const pLabel = p ? `<span class="meal-event-portion ${portionClass[p]}">${portionLabel[p]}</span>` : '';
          return `<div class="meal-event-food-row">
            <span class="meal-event-food-name">${escHtml(f.name)}</span>
            ${pLabel}
          </div>`;
        }).join('') + '</div>';
    }
    const noteHtml = ev.note ? `<div class="meal-event-note">${escHtml(ev.note)}</div>` : '';
    return `<div class="meal-event-card">
      <div class="meal-event-card-header">
        <div><span class="meal-event-type-label">${escHtml(ev.type||'食事')}</span>${timeStr}</div>
        <div class="meal-event-btns">
          <button class="meal-event-edit-btn" onclick="editMealEvent('${ev.id}')">編集</button>

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function editMealEvent(id) {

  mealEventFoods = (ev.foods || []).map(f => ({ name: f.name, portion: f.portion || '' }));

  document.getElementById('mealEventTime').value = ev.time || '';

function buildMealEventPresets() {
  const container = document.getElementById('mealEventPresets');
  container.innerHTML = '';
  MEAL_PRESETS.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'meal-preset-tag' + (mealEventFoods.some(f => f.name === name) ? ' selected' : '');
    btn.textContent = name;
    btn.onclick = () => toggleMealEventPreset(name, btn);
    container.appendChild(btn);
  });
}

function toggleMealEventPreset(name, btn) {
  const idx = mealEventFoods.findIndex(f => f.name === name);
  if (idx !== -1) { mealEventFoods.splice(idx, 1); btn.classList.remove('selected'); }
  else            { mealEventFoods.push({ name, portion: '' }); btn.classList.add('selected'); }
  renderMealEventChips();
}

function addMealEventCustomFood() {
  const input = document.getElementById('mealEventCustomInput');
  const name  = input.value.trim();
  if (!name) return;
  if (mealEventFoods.some(f => f.name === name)) { showToast('すでに追加されています'); return; }
  mealEventFoods.push({ name, portion: '' });
  input.value = '';
  buildMealEventPresets();
  renderMealEventChips();
}

function renderMealEventChips() {
  const wrap = document.getElementById('mealEventChips');
  const hint = document.getElementById('mealEventChipHint');
  wrap.querySelectorAll('.meal-food-chip').forEach(el => el.remove());

  if (!mealEventFoods.length) { hint.style.display = 'inline'; return; }
  hint.style.display = 'none';

  const portionCls = { s:'cp-s', m:'cp-m', l:'cp-l' };
  const portionLbl = { s:'S', m:'M', l:'L' };

  mealEventFoods.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'meal-food-chip';
    // single row: name | S M L | ×
    chip.style.cssText = 'display:flex;align-items:center;gap:6px;padding:6px 8px 6px 12px;width:100%;border-radius:10px;margin-bottom:4px;flex-wrap:nowrap';

    // food name
    const lbl = document.createElement('span');
    lbl.textContent = f.name;
    lbl.style.cssText = 'font-weight:700;font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
    chip.appendChild(lbl);

    // S / M / L buttons inline
    ['s','m','l'].forEach(p => {
      const pb = document.createElement('button');
      const isActive = f.portion === p;
      pb.textContent = portionLbl[p];
      pb.style.cssText = 'width:28px;height:24px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg);font-family:Noto Sans JP,sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s;color:var(--text-sub);flex-shrink:0;padding:0';
      if (isActive) {
        const bg    = { s:'#d4f5e9', m:'#fef3d0', l:'#fde0e0' };
        const color = { s:'#2a9d6a', m:'#b8820a', l:'#c04040' };
        pb.style.background   = bg[p];
        pb.style.color        = color[p];
        pb.style.borderColor  = 'transparent';
      }
      pb.onclick = () => {
        mealEventFoods[i].portion = p;
        renderMealEventChips();
      };
      chip.appendChild(pb);
    });

    // remove button
    const rb = document.createElement('button');
    rb.className = 'meal-chip-remove';
    rb.innerHTML = '×';
    rb.style.flexShrink = '0';
    rb.onclick = () => {
      mealEventFoods.splice(i, 1);
      document.querySelectorAll('.meal-preset-tag').forEach(btn => {
        if (btn.textContent === f.name) btn.classList.remove('selected');
      });
      renderMealEventChips();
    };
    chip.appendChild(rb);

    wrap.appendChild(chip);
  });
}

function addPhoto(event) {
  const files = event.target.files;
  if (!files.length) return;
  if (tempPhotos.length >= 5) { showToast('写真は最大5枚です'); return; }
  Array.from(files).forEach(file => {
    if (tempPhotos.length >= 5) return;
    const reader = new FileReader();
    reader.onload = e => {
      tempPhotos.push(e.target.result);
      renderPhotoPreview();
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function renderPhotoPreview() {
  const container = document.getElementById('photoPreview');
  container.innerHTML = '';
  tempPhotos.forEach((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'photo-thumb-wrap';
    const img = document.createElement('img');
    img.className = 'photo-thumb';
    img.src = src;
    const del = document.createElement('button');
    del.className = 'photo-del-btn';
    del.textContent = '×';
    del.onclick = () => { tempPhotos.splice(i,1); renderPhotoPreview(); };
    wrap.appendChild(img);
    wrap.appendChild(del);
    container.appendChild(wrap);
  });
  if (tempPhotos.length < 5) {
    const add = document.createElement('button');
    add.className = 'photo-add-btn';
    add.textContent = '+';
    add.onclick = () => document.getElementById('photoInput').click();
    container.appendChild(add);
  }
}

function getWeightData(days) {
  const dates = Object.keys(data).sort();
  let filtered = dates;
  if (days !== 'all') {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - parseInt(days));
    const cutStr = localDateStr(cutoff);
    filtered = dates.filter(d => d >= cutStr);
  }
  return {
    labels: filtered.map(d => d.slice(5)),
    values: filtered.map(d => {
      const r = data[d];
      return parseFloat(r.weight.morning || r.weight.evening) || null;
    })
  };
}

// ===================== WEEK/MONTH VIEW =====================
function getWeekRange() {
  const d = new Date(currentDate + 'T00:00:00');
  const day = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - (day === 0 ? 6 : day-1));
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  return { start: localDateStr(mon), end: localDateStr(sun) };
}

function getMonthRange() {
  const [y, m] = currentDate.split('-');
  return {
    start: `${y}-${m}-01`,
    end: `${y}-${m}-${new Date(y, m, 0).getDate()}`
  };
}

function getRecordsInRange(start, end) {
  return Object.keys(data)
    .filter(d => d >= start && d <= end)
    .sort()
    .map(d => data[d]);
}

function renderWeekView() {
  const { start, end } = getWeekRange();
  const recs = getRecordsInRange(start, end);
  const weights = recs.map(r => parseFloat(r.weight.morning||r.weight.evening)).filter(Boolean);
  const drinkDays = recs.filter(r => r.alcohol.hasAlcohol === true).length;
  const exDays = recs.filter(r => r.exercise.types && r.exercise.types.length && !r.exercise.types.includes('なし')).length;

  document.getElementById('weekStats').innerHTML = `
    <div class="stat-row"><span class="stat-label">期間</span><span class="stat-value">${start} 〜 ${end}</span></div>
    <div class="stat-row"><span class="stat-label">平均体重</span><span class="stat-value">${avgW}${avgW!=='---'?'kg':''}</span></div>
    <div class="stat-row"><span class="stat-label">飲酒日数</span><span class="stat-value">${drinkDays}日</span></div>

  else text = buildMonthText();

function buildDayText(dateStr) {
  const r = data[dateStr];
  if (!r) return `${dateStr} のデータがありません`;
  const lines = [];
  lines.push('【健康記録】\n');
  lines.push(`■日付\n${dateStr}\n`);
  lines.push(`■体重\n朝: ${r.weight.morning||'未入力'}kg\n夜: ${r.weight.evening||'未入力'}kg\n`);
  if (r.mealEvents && r.mealEvents.length) {
    const mealLines = r.mealEvents.map(ev => {
      const foods = (ev.foods||[]).filter(f=>f.name).map(f=>f.name).join('、') || '未記入';
      const t = ev.time ? ` (${ev.time})` : '';
      return `${ev.type||'食事'}${t}: ${foods}${ev.note?' / '+ev.note:''}`;
    });
    lines.push(`■食事\n${mealLines.join('\n')}\n`);
  }
  if (r.alcohol.hasAlcohol === true) {
    lines.push(`■飲酒\n${r.alcohol.types.join('・')} ${r.alcohol.cups}杯（${r.alcohol.place}）${r.alcohol.note?'\n'+r.alcohol.note:''}\n`);
  } else if (r.alcohol.hasAlcohol === false) {
    lines.push(`■飲酒\nなし\n`);
  }
  if (r.exercise.types && r.exercise.types.length) {
    lines.push(`■運動\n${r.exercise.types.join('・')} ${r.exercise.duration||''} ${r.exercise.note||''}\n`);
  }
  if (r.sleep.bedTime || r.sleep.wakeTime) {
    lines.push(`■睡眠\n就寝: ${r.sleep.bedTime||'---'}\n起床: ${r.sleep.wakeTime||'---'}${r.sleep.hours?'\n'+r.sleep.hours:''}\n`);
  }
  if (r.toilet.bowelCount) {
    lines.push(`■トイレ\n排便: ${r.toilet.bowelCount} / ${r.toilet.bowelCondition||''}\n排尿: ${r.toilet.urination||''}\n`);
  }
  if (r.water.intake) lines.push(`■水分\n${r.water.intake}\n`);
  if (r.condition.tags.length || r.condition.memo) {
    lines.push(`■体調\n${r.condition.tags.join('、')}${r.condition.memo?'\nメモ: '+r.condition.memo:''}\n`);
  }
  lines.push('\nこの記録をもとに、傾向と改善点を簡潔に分析してください。');
  return lines.join('\n');
}

function buildWeekText() {
  const { start, end } = getWeekRange();
  const recs = getRecordsInRange(start, end);
  if (!recs.length) return '今週のデータがありません';
  let text = `【週間健康記録】\n期間: ${start} 〜 ${end}\n\n`;
  recs.forEach(r => { text += buildDayText(r.date) + '\n---\n\n'; });
  text += 'この週の記録を分析し、傾向と改善点を教えてください。';
  return text;
}

function buildMonthText() {
  const { start, end } = getMonthRange();
  const recs = getRecordsInRange(start, end);
  if (!recs.length) return '今月のデータがありません';
  const weights = recs.map(r => parseFloat(r.weight.morning||r.weight.evening)).filter(Boolean);
  const avgW = weights.length ? (weights.reduce((a,b)=>a+b,0)/weights.length).toFixed(1) : '---';
  const drinkDays = recs.filter(r => r.alcohol.hasAlcohol===true).length;
  const exDays = recs.filter(r => r.exercise.types&&r.exercise.types.length&&!r.exercise.types.includes('なし')).length;
  return `【月間健康記録サマリー】\n期間: ${start} 〜 ${end}\n記録日数: ${recs.length}日\n\n■体重\n平均: ${avgW}kg\n最低: ${weights.length?Math.min(...weights).toFixed(1):'---'}kg\n最高: ${weights.length?Math.max(...weights).toFixed(1):'---'}kg\n\n■生活習慣\n飲酒日数: ${drinkDays}日\n運動日数: ${exDays}日\n\nこの月の記録を分析し、傾向と改善点を教えてください。`;
}

function copyExportText() {
  const text = document.getElementById('exportText').value;
  navigator.clipboard.writeText(text).then(() => showToast('クリップボードにコピーしました')).catch(() => {
    document.getElementById('exportText').select();
    document.execCommand('copy');
    showToast('コピーしました');
  });
}

// ===================== SETTINGS =====================
function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `diet_diary_backup_${todayStr()}.json`;
  a.click();
  showToast('バックアップを書き出しました');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (confirm('データを上書きインポートしますか？')) {
        data = imported;
        saveData();
        renderDay();
        showToast('データをインポートしました');
      }
    } catch { showToast('ファイルが正しくありません'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function clearAllData() {
  if (confirm('すべてのデータを削除します。元に戻せません。よろしいですか？')) {
    data = {};
    saveData();
    renderDay();
    showToast('データを削除しました');
  }
}

// ===================== TOAST =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
